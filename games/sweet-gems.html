<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#0d0520;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
body{display:flex;justify-content:center;font-family:'Inter',sans-serif;color:#fff}
#GC{position:relative;width:100%;max-width:480px;height:100%;height:100dvh;overflow:hidden;flex-shrink:0}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

/* UI overlays */
.ui{position:relative;z-index:10;pointer-events:none}
.ui *{pointer-events:auto}

.top{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;z-index:10;position:relative}
.bbk{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:16px;color:#fff;backdrop-filter:blur(10px)}
.bbk:active{transform:scale(.9);border-color:rgba(255,200,0,.5)}
.ttl{font-family:'Lilita One',cursive;font-size:clamp(16px,5vw,22px);background:linear-gradient(180deg,#ffe44d 0%,#ff8c00 50%,#ff5500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));letter-spacing:1px}
.bal{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:clamp(10px,3vw,12px);font-weight:700;backdrop-filter:blur(10px)}
.bal span{color:#7df56a}

/* Bottom panel */
.bp{position:absolute;bottom:0;left:0;right:0;z-index:20;padding-bottom:max(env(safe-area-inset-bottom,0px),6px)}
.bp-bg{background:linear-gradient(180deg,transparent 0%,rgba(10,5,20,.98) 20%);padding:14px 12px 6px}

.cr{display:flex;align-items:center;justify-content:space-between;gap:6px}
.bs,.ws{flex:1;text-align:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 6px}
.sl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.bv{font-size:clamp(14px,4vw,18px);font-weight:900;color:#fff;margin-top:2px}
.wv{font-size:clamp(14px,4vw,18px);font-weight:900;color:#7df56a;margin-top:2px;min-height:20px}
.bc{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
.bb{width:30px;height:30px;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:Inter}
.bb:active{transform:scale(.85);background:rgba(255,200,0,.2);border-color:rgba(255,200,0,.4)}

/* Spin button */
.sw{position:relative;display:flex;align-items:center;justify-content:center;margin:0 4px}
.sb{width:clamp(56px,16vw,68px);height:clamp(56px,16vw,68px);border-radius:50%;background:linear-gradient(145deg,#7df56a 0%,#2dba1f 50%,#1a8a12 100%);border:3px solid rgba(255,255,255,.25);cursor:pointer;position:relative;box-shadow:0 0 25px rgba(125,245,106,.4),0 6px 20px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.3);transition:.15s;display:flex;align-items:center;justify-content:center}
.sb::before{content:'';position:absolute;top:4px;left:15%;right:15%;height:35%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.4),transparent);pointer-events:none}
.sb svg{width:26px;height:26px;fill:#fff;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.sb:active{transform:scale(.92);box-shadow:0 0 12px rgba(125,245,106,.3),0 3px 10px rgba(0,0,0,.4)}
.sb.sp{animation:spr .6s linear infinite}
.sb.dis{opacity:.4;pointer-events:none}
@keyframes spr{to{transform:rotate(360deg)}}
.sg{position:absolute;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(125,245,106,.12),transparent 70%);animation:pg 2s ease-in-out infinite;pointer-events:none}
@keyframes pg{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.4);opacity:.8}}

/* Extra buttons */
.sr{display:flex;justify-content:center;gap:8px;margin-top:8px}
.bt{padding:5px 16px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:10px;font-weight:700;cursor:pointer;transition:.15s;font-family:Inter;letter-spacing:.5px}
.bt.ac{background:rgba(125,245,106,.1);border-color:rgba(125,245,106,.3);color:#7df56a}
.bt:active{transform:scale(.93)}

/* Buy Bonus */
.buy-wrap{display:flex;justify-content:center;gap:8px;margin-top:8px}
.buy-btn{padding:7px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(125,245,106,.12),rgba(255,200,0,.08));border:1px solid rgba(125,245,106,.3);color:#7df56a;font-size:11px;font-weight:800;cursor:pointer;transition:.2s;font-family:Inter;letter-spacing:.5px;text-transform:uppercase;position:relative;overflow:hidden}
.buy-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:translateX(-100%);transition:none}
.buy-btn:hover::before{transform:translateX(100%);transition:transform .6s}
.buy-btn:active{transform:scale(.93)}
.buy-btn.dis{opacity:.35;pointer-events:none}
.buy-btn .cost{color:#ffe44d;margin-left:4px}

/* Free Spins Intro Overlay */
.fsi{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .4s}
.fsi.sh{opacity:1;pointer-events:auto}
.fsi-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(125,245,106,.3),rgba(255,200,0,.15),transparent 70%);animation:fsiPulse 1.5s ease-in-out infinite}
@keyframes fsiPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:1}}
.fsi-title{font-family:'Lilita One',cursive;font-size:18px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:6px;position:relative;z-index:1}
.fsi-count{font-family:'Lilita One',cursive;font-size:80px;background:linear-gradient(180deg,#ffe44d,#ff8c00,#ff5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(255,200,0,.5));line-height:1;position:relative;z-index:1;animation:fsiPop .6s cubic-bezier(.175,.885,.32,1.275)}
.fsi-sub{font-family:'Lilita One',cursive;font-size:24px;color:#7df56a;letter-spacing:3px;position:relative;z-index:1;margin-top:4px;text-shadow:0 0 20px rgba(125,245,106,.5)}
.fsi-mul{font-size:14px;color:#ffe44d;margin-top:10px;font-weight:700;position:relative;z-index:1}
@keyframes fsiPop{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}

/* Win popup */
.wp{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:30;text-align:center;pointer-events:none;opacity:0;transition:transform .4s cubic-bezier(.175,.885,.32,1.275),opacity .3s}
.wp.sh{transform:translate(-50%,-50%) scale(1);opacity:1}
.wp .wl{font-family:'Lilita One',cursive;font-size:16px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.wp .wa{font-family:'Lilita One',cursive;font-size:52px;background:linear-gradient(180deg,#ffe44d,#ff8c00,#ff5500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));line-height:1.1}
.wp .wm{font-size:14px;color:#7df56a;margin-top:4px;font-weight:700;text-shadow:0 0 10px rgba(125,245,106,.5)}
.wp.big .wl{font-size:22px;color:#ffe44d;text-shadow:0 0 20px rgba(255,228,77,.6)}
.wp.big .wa{font-size:62px}
.wp.epic .wl{font-size:26px;background:linear-gradient(90deg,#ff4444,#ffe44d,#44ff44,#44aaff,#ff44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:epicGlow 1s ease infinite}
.wp.epic .wa{font-size:72px}
@keyframes epicGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(255,68,68,.8))}50%{filter:drop-shadow(0 0 20px rgba(255,228,77,.8))}}

/* Free spins banner */
.fb{position:absolute;top:46px;left:50%;transform:translateX(-50%);z-index:25;background:linear-gradient(135deg,rgba(125,245,106,.15),rgba(45,186,31,.1));border:1px solid rgba(125,245,106,.3);border-radius:25px;padding:6px 20px;display:none;align-items:center;gap:10px;font-size:13px;font-weight:700;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.fb.sh{display:flex}
.fb .fc{color:#7df56a}
.fb .fm{color:#ffe44d;margin-left:6px}

/* Ante toggle */
.at{position:absolute;top:46px;right:8px;z-index:25;display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.5px}
.as{width:32px;height:18px;border-radius:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);position:relative;transition:.2s;cursor:pointer}
.as::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#555;transition:.2s}
.as.on{background:rgba(125,245,106,.25);border-color:rgba(125,245,106,.3)}
.as.on::after{left:16px;background:#7df56a}

.cfc{position:absolute;inset:0;z-index:35;pointer-events:none}
.ptm{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);display:none;overflow-y:auto;padding:16px;border-radius:0}
.ptm.sh{display:block}
.ptm h2{font-family:'Lilita One',cursive;text-align:center;font-size:20px;color:#7df56a;margin-bottom:12px}
.ptm .close{position:absolute;top:10px;right:14px;font-size:22px;cursor:pointer;color:#fff;z-index:61}
.pt-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06)}
.pt-sym{font-size:24px;width:36px;text-align:center}
.pt-name{font-weight:700;font-size:11px;color:rgba(255,255,255,.5);width:65px}
.pt-pays{display:flex;gap:6px;font-size:10px;font-weight:600}
.pt-pays span{color:#ffe44d}
.pt-info{padding:10px;font-size:11px;color:rgba(255,255,255,.6);line-height:1.6}
.pt-info b{color:#7df56a}

@keyframes sk{0%,100%{transform:translate(0)}10%{transform:translate(-4px,3px)}20%{transform:translate(5px,-3px)}30%{transform:translate(-3px,5px)}40%{transform:translate(4px,-2px)}50%{transform:translate(-5px,4px)}60%{transform:translate(3px,-4px)}70%{transform:translate(-2px,3px)}80%{transform:translate(4px,-3px)}90%{transform:translate(-3px,2px)}}.shk{animation:sk .5s ease-in-out}
</style>

<script>
(function(){
"use strict";
const cv=document.getElementById('cv'),cx=cv.getContext('2d'),gc=document.getElementById('GC');
let W,H,DP;

function resize(){
  DP=Math.min(devicePixelRatio||1,2);
  W=gc.clientWidth;H=gc.clientHeight;
  cv.width=W*DP;cv.height=H*DP;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DP,0,0,DP,0,0);
  calcGrid();resizeConf();
  // Reposition existing symbols to new grid positions
  if(grid&&grid.length){
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
      if(grid[c]&&grid[c][r]){
        const s=grid[c][r];
        s.x=gL+c*cW+cW/2;
        s.y=gT+r*cH+cH/2;
        s.ty=s.y;
      }
    }
  }
}
addEventListener('resize',resize);

// ═══ CONFIG ═══
const COLS=6,ROWS=5,BETS=[.2,.5,1,2,5,10];

const SYM=[
  {id:0,n:'Heart',      pMin:25,pMax:50,w:5,  colors:['#ff2d55','#e8174a','#b80d38','#ff8fa8'],type:'heart'},
  {id:1,n:'Grape',      pMin:12,pMax:25,w:8,  colors:['#7b2d8e','#5a1e6a','#3d1248','#c77ddb'],type:'grape'},
  {id:2,n:'Watermelon', pMin:8,pMax:15,w:10,  colors:['#30c755','#1fa040','#167a30','#aef0c0'],type:'melon'},
  {id:3,n:'Candy',      pMin:5,pMax:10,w:14,  colors:['#cc44ff','#9b1fd4','#6a0fa0','#e880ff'],type:'plum'},
  {id:4,n:'Banana',     pMin:3,pMax:8,w:18,   colors:['#ffe135','#ffc107','#e6a800','#fff9c4'],type:'banana'},
  {id:5,n:'BluCandy',   pMin:2,pMax:5,w:20,   colors:['#2196f3','#1976d2','#0d47a1','#90caf9'],type:'bluecandy'},
  {id:6,n:'Star',       pMin:0,pMax:0,w:6,    colors:['#ffd700','#ffb300','#ff8f00','#fff8e1'],type:'star'},
  {id:7,n:'Bomb',       pMin:0,pMax:0,w:0,    colors:['#546e7a','#37474f','#263238','#cfd8dc'],type:'bomb'},
];
const SCAT=6,BOMB=7;

// ═══ SOUND ENGINE (Web Audio API) ═══
let sndOn=true,audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}
function playTone(freq,dur,type,vol,ramp){
  if(!sndOn||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(ramp)o.frequency.linearRampToValueAtTime(ramp,audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol||.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sndSpin(){playTone(200,.25,'sawtooth',.08,800)}
function sndStop(i){playTone(400+i*80,.08,'square',.06)}
function sndWin(){[523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,.18,'sine',.1),i*90))}
function sndBigWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,.22,'triangle',.12),i*100))}
function sndScatter(){[880,1108,1320,1760].forEach((f,i)=>setTimeout(()=>playTone(f,.15,'sine',.1),i*80))}
function sndClick(){playTone(600,.05,'square',.05)}

// ═══ CONFETTI SYSTEM ═══
const confCvs=document.getElementById('confCvs'),confCtx=confCvs.getContext('2d');
let confParts=[],confActive=false;
function resizeConf(){confCvs.width=gc.clientWidth;confCvs.height=gc.clientHeight}
function startConfetti(){
  confParts=[];confActive=true;resizeConf();
  const colors=['#ff2d55','#ffe44d','#7df56a','#2196f3','#cc44ff','#ff8c00','#00e5ff'];
  for(let i=0;i<120;i++){
    confParts.push({x:Math.random()*confCvs.width,y:-Math.random()*confCvs.height*.5-20,
      vx:(Math.random()-.5)*4,vy:2+Math.random()*4,
      w:4+Math.random()*6,h:6+Math.random()*10,
      r:Math.random()*Math.PI*2,rv:.05+Math.random()*.1,
      c:colors[Math.floor(Math.random()*colors.length)],
      l:1,d:.003+Math.random()*.004});
  }
}
function updConfetti(){
  if(!confActive)return;
  confCtx.clearRect(0,0,confCvs.width,confCvs.height);
  let alive=0;
  for(const p of confParts){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.r+=p.rv;p.l-=p.d;
    if(p.l<=0||p.y>confCvs.height+20)continue;
    alive++;
    confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.r);
    confCtx.globalAlpha=Math.min(p.l,1);
    confCtx.fillStyle=p.c;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  }
  if(alive===0){confActive=false;confCtx.clearRect(0,0,confCvs.width,confCvs.height)}
}

// ═══ PAYTABLE ═══
function buildPaytable(){
  const symEmoji=['❤️','🍇','🍉','🍬','🍌','🍭','⭐','💣'];
  let html='<div class="close" id="ptClose">&times;</div><h2>PAYTABLE</h2>';
  SYM.forEach((s,i)=>{
    if(s.pMin===0&&s.pMax===0&&i!==SCAT&&i!==BOMB)return;
    html+='<div class="pt-row"><div class="pt-sym">'+symEmoji[i]+'</div><div class="pt-name">'+s.n+'</div>';
    if(s.pMin>0||s.pMax>0){
      html+='<div class="pt-pays"><span>8+: '+s.pMin+'x</span><span>30: '+s.pMax+'x</span></div>';
    }else if(i===SCAT){
      html+='<div class="pt-pays"><span>SCATTER</span></div>';
    }else if(i===BOMB){
      html+='<div class="pt-pays"><span>MULTIPLIER</span></div>';
    }
    html+='</div>';
  });
  html+='<div class="pt-info">';
  html+='<b>Cluster Pays:</b> 8+ adjacent matching symbols = WIN<br>';
  html+='<b>Tumble:</b> Winning symbols removed, new ones fall<br>';
  html+='<b>Free Spins:</b> 4+ Stars trigger free spins (4=10, 5=15, 6=20)<br>';
  html+='<b>Bombs:</b> Random multiplier during Free Spins<br>';
  html+='<b>Buy Bonus:</b> 100x bet (10 spins) or 250x bet (15 spins, 3x start multi)';
  html+='</div>';
  document.getElementById('ptM').innerHTML=html;
  document.getElementById('ptClose').addEventListener('click',()=>document.getElementById('ptM').classList.remove('sh'));
}

// ═══ SEEDED PRNG ═══
let _seed=Date.now()^0xDEADBEEF;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let gameRand=mulberry32(_seed);
function setSeed(s){_seed=s;gameRand=mulberry32(_seed)}
// Get seed from URL or parent
const _urlSeed=new URLSearchParams(window.location.search).get('seed');
if(_urlSeed)setSeed(parseInt(_urlSeed));

// ═══ STATE ═══
const _urlBal=new URLSearchParams(window.location.search).get('bal');
let state='IDLE',bal=_urlBal?parseFloat(_urlBal):1000,bIdx=2,bet=BETS[bIdx];
let grid=[],turbo=false,autoP=false,ante=false;
let fsLeft=0,fsMul=1,totWin=0,fsTotalWin=0;
let activeWins=[],tumbleNum=0;
let gL,gT,gW,gH,cW,cH,sR;
let t0=0;

function calcGrid(){
  const p=6;
  const topGap=48;
  // Use visualViewport height if available (accounts for browser chrome on mobile)
  const vh=(window.visualViewport?window.visualViewport.height:H);
  const botPanel=130;
  const availH=vh-topGap-botPanel;
  const availW=W-p*2;

  cW=availW/COLS;
  const maxCH=availH/ROWS;
  cH=Math.min(cW*1.6,maxCH);

  gW=cW*COLS;gH=cH*ROWS;
  gL=(W-gW)/2;
  gT=topGap+Math.max(0,(availH-gH)*.2);
  sR=Math.min(cW,cH)*.34;
}

// Listen for visualViewport resize (keyboard, browser chrome changes)
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{resize();});
}

// ═══ PARTICLES & EFFECTS ═══
const parts=[],dust=[],coins=[],bubbles=[],sparkles=[],shockwaves=[];
function mkDust(){for(let i=0;i<30;i++)dust.push({x:Math.random()*500,y:Math.random()*900,s:1+Math.random()*2.5,a:.03+Math.random()*.07,vx:(Math.random()-.5)*.2,vy:-.15-Math.random()*.25,hue:Math.random()*60+280})}
mkDust();
function mkBubbles(){for(let i=0;i<15;i++)bubbles.push({x:Math.random()*500,y:Math.random()*900,s:3+Math.random()*8,a:.02+Math.random()*.04,vy:-.2-Math.random()*.4,vx:(Math.random()-.5)*.3,phase:Math.random()*Math.PI*2})}
mkBubbles();

function addP(x,y,col,n){for(let i=0;i<n&&parts.length<500;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,l:1,d:.01+Math.random()*.018,s:2+Math.random()*5,c:col,type:Math.random()>.4?'circle':'star'})}}
function addCoins(n){for(let i=0;i<n;i++)coins.push({x:Math.random()*W,y:-20-Math.random()*200,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,s:5+Math.random()*8,r:Math.random()*Math.PI*2,rs:.05+Math.random()*.1,l:1,d:.002+Math.random()*.003})}
// Sparkle shimmer on symbols
function addSparkle(x,y,n){for(let i=0;i<n&&sparkles.length<200;i++){sparkles.push({x:x+(Math.random()-.5)*sR*1.5,y:y+(Math.random()-.5)*sR*1.5,l:1,d:.02+Math.random()*.03,s:1.5+Math.random()*3,phase:Math.random()*Math.PI*2,sp:Math.random()*.03})}}
// Shockwave ring effect on big wins
function addShockwave(x,y){shockwaves.push({x,y,r:0,maxR:sR*3,l:1,speed:4})}

// ═══ SYMBOL GENERATION ═══
function rndSym(){
  const t=SYM.filter(s=>s.id!==BOMB);let tw=0;
  const ws=t.map(s=>{let ww=s.w;if(s.id===SCAT&&ante)ww*=2;tw+=ww;return ww});
  let r=gameRand()*tw;
  for(let i=0;i<t.length;i++){r-=ws[i];if(r<=0)return t[i].id}
  return t[t.length-1].id;
}
function fsSym(){return gameRand()<.14?BOMB:rndSym()}
function mkSym(c,r,id){
  const sx=gL+c*cW+cW/2,sy=gT+r*cH+cH/2;
  return{id,c,r,x:sx,y:sy,ty:sy,vy:0,sc:1,al:1,gl:0,bp:Math.random()*Math.PI*2,bm:0,fall:false,rot:0,shimmer:Math.random()*Math.PI*2,popSc:0,popT:0}
}
function initGrid(){grid=[];for(let c=0;c<COLS;c++){grid[c]=[];for(let r=0;r<ROWS;r++)grid[c][r]=mkSym(c,r,rndSym())}}

// ═══ DRAWING: BACKGROUND ═══
function drawBG(t){
  // Vibrant candy purple/pink background like real Sweet Bonanza
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4a1a7a');g.addColorStop(.2,'#6b2fa0');g.addColorStop(.4,'#7b35b0');
  g.addColorStop(.6,'#5e2590');g.addColorStop(.8,'#3d1570');g.addColorStop(1,'#1a0835');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // Bright pink/magenta light orbs
  const orbT=t*.0004;
  [[W*.15,H*.12,'#ff69b4',90],[W*.85,H*.2,'#e040fb',80],[W*.5,H*.06,'#ff4081',70],
   [W*.05,H*.45,'#7c4dff',80],[W*.95,H*.55,'#e91e63',60],[W*.5,H*.85,'#ab47bc',70]].forEach(([ox,oy,col,r])=>{
    const px=ox+Math.sin(orbT+ox*.01)*20, py=oy+Math.cos(orbT+oy*.01)*15;
    const og=cx.createRadialGradient(px,py,0,px,py,r);
    og.addColorStop(0,col+'30');og.addColorStop(.5,col+'12');og.addColorStop(1,'transparent');
    cx.fillStyle=og;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  });

  // Sparkle dust
  for(const d of dust){
    d.x+=d.vx;d.y+=d.vy;
    if(d.y<-10){d.y=H+10;d.x=Math.random()*W}
    cx.beginPath();cx.arc(d.x,d.y,d.s,0,Math.PI*2);
    cx.fillStyle=`hsla(${d.hue},90%,80%,${d.a})`;cx.fill();
  }

  // Floating bubbles
  for(const b of bubbles){
    b.y+=b.vy;b.x+=b.vx+Math.sin(t*.001+b.phase)*.3;
    if(b.y<-20){b.y=H+20;b.x=Math.random()*W}
    cx.beginPath();cx.arc(b.x,b.y,b.s,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${b.a})`;cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(b.x-b.s*.25,b.y-b.s*.25,b.s*.2,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${b.a*1.5})`;cx.fill();
  }
}

// ═══ DRAWING: GRID BACKGROUND ═══
function drawGridBG(){
  cx.save();
  const pad=6;
  roundRect(gL-pad,gT-pad,gW+pad*2,gH+pad*2,14);
  cx.fillStyle='rgba(0,0,0,.3)';cx.fill();
  cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=1.5;cx.stroke();

  // No grid lines — clean look
  cx.restore();
}

function roundRect(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y)}

// ═══ DRAWING: SYMBOLS (Photorealistic 3D) ═══
function drawSym(s,t){
  const tp=SYM[s.id],bob=s.fall?0:Math.sin(s.bp+t*.002)*1.5;
  const x=s.x,y=s.y+bob,R=sR*s.sc,al=s.al;
  if(al<=0||R<=0)return;
  cx.save();cx.globalAlpha=al;

  // Drop shadow (soft, large)
  cx.beginPath();cx.ellipse(x,y+R*.9,R*.6,R*.15,0,0,Math.PI*2);
  const shg=cx.createRadialGradient(x,y+R*.9,0,x,y+R*.9,R*.6);
  shg.addColorStop(0,'rgba(0,0,0,.4)');shg.addColorStop(1,'transparent');
  cx.fillStyle=shg;cx.fill();

  // Win glow — animated pulsing ring
  if(s.gl>0){
    const glPulse=.7+Math.sin(t*.006)*0.3;
    cx.beginPath();cx.arc(x,y,R*1.8*glPulse,0,Math.PI*2);
    const gg=cx.createRadialGradient(x,y,R*.15,x,y,R*1.8*glPulse);
    gg.addColorStop(0,tp.colors[0]+'aa');gg.addColorStop(.4,tp.colors[0]+'55');gg.addColorStop(.7,tp.colors[0]+'22');gg.addColorStop(1,'transparent');
    cx.fillStyle=gg;cx.globalAlpha=al*s.gl*glPulse;cx.fill();
    // Animated ring
    cx.beginPath();cx.arc(x,y,R*1.2*glPulse,0,Math.PI*2);
    cx.strokeStyle=tp.colors[0]+'88';cx.lineWidth=2;cx.globalAlpha=al*s.gl*.6;cx.stroke();
    cx.globalAlpha=al;
  }

  // Pop-in scale animation
  let scaleBonus=1;
  if(s.popSc>0){s.popSc*=.92;scaleBonus=1+s.popSc*.3}

  cx.translate(x,y);
  if(scaleBonus!==1){cx.scale(scaleBonus,scaleBonus)}
  const [c1,c2,c3,c4]=tp.colors;
  const type=tp.type;

  if(type==='heart'){
    // ★ RED GLASS HEART - glossy, translucent, 3D
    const hr=R*.75;
    cx.beginPath();
    cx.moveTo(0,-hr*.3);
    cx.bezierCurveTo(-hr*.05,-hr*.85,-hr,-hr*.85,-hr,-hr*.3);
    cx.bezierCurveTo(-hr,hr*.15,-hr*.15,hr*.55,0,hr*.85);
    cx.bezierCurveTo(hr*.15,hr*.55,hr,hr*.15,hr,-hr*.3);
    cx.bezierCurveTo(hr,-hr*.85,hr*.05,-hr*.85,0,-hr*.3);
    cx.closePath();
    // Multi-stop radial for 3D depth
    const hg=cx.createRadialGradient(-hr*.25,-hr*.35,0,0,hr*.1,hr*1.1);
    hg.addColorStop(0,'#ffb3c6');hg.addColorStop(.15,'#ff6b8a');hg.addColorStop(.4,'#ff2d55');
    hg.addColorStop(.7,'#d81b42');hg.addColorStop(1,'#8b0a25');
    cx.fillStyle=hg;cx.fill();
    // Glossy border
    cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=1.5;cx.stroke();
    // Top-left specular highlight (big, soft)
    cx.save();
    cx.beginPath();
    cx.moveTo(0,-hr*.3);
    cx.bezierCurveTo(-hr*.05,-hr*.85,-hr,-hr*.85,-hr,-hr*.3);
    cx.bezierCurveTo(-hr,hr*.15,-hr*.15,hr*.55,0,hr*.85);
    cx.bezierCurveTo(hr*.15,hr*.55,hr,hr*.15,hr,-hr*.3);
    cx.bezierCurveTo(hr,-hr*.85,hr*.05,-hr*.85,0,-hr*.3);
    cx.clip();
    // Primary shine spot
    cx.beginPath();cx.ellipse(-hr*.32,-hr*.42,hr*.35,hr*.2,-.5,0,Math.PI*2);
    const shg2=cx.createRadialGradient(-hr*.32,-hr*.42,0,-hr*.32,-hr*.42,hr*.35);
    shg2.addColorStop(0,'rgba(255,255,255,.85)');shg2.addColorStop(.4,'rgba(255,255,255,.3)');shg2.addColorStop(1,'transparent');
    cx.fillStyle=shg2;cx.fill();
    // Secondary small bright dot
    cx.beginPath();cx.arc(-hr*.2,-hr*.5,hr*.08,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,.9)';cx.fill();
    // Bottom reflection
    cx.beginPath();cx.ellipse(hr*.15,hr*.45,hr*.25,hr*.1,.3,0,Math.PI*2);
    cx.fillStyle='rgba(255,180,200,.15)';cx.fill();
    cx.restore();

  }else if(type==='grape'){
    // ★ GRAPE CLUSTER - individual glossy berries in cluster
    const positions=[
      [0,-R*.55],[-R*.28,-R*.35],[R*.28,-R*.35],
      [-R*.42,-R*.05],[0,-R*.08],[R*.42,-R*.05],
      [-R*.28,R*.22],[R*.28,R*.22],[0,R*.18],
      [-R*.14,R*.48],[R*.14,R*.48],[0,R*.7]
    ];
    const gs=R*.22;
    positions.forEach(([gx,gy])=>{
      cx.beginPath();cx.arc(gx,gy,gs,0,Math.PI*2);
      const gg=cx.createRadialGradient(gx-gs*.35,gy-gs*.4,0,gx,gy,gs);
      gg.addColorStop(0,'#d4a0e8');gg.addColorStop(.25,'#a855d4');gg.addColorStop(.55,'#7b2d8e');
      gg.addColorStop(.85,'#4a1560');gg.addColorStop(1,'#2d0a3a');
      cx.fillStyle=gg;cx.fill();
      // Each berry specular
      cx.beginPath();cx.ellipse(gx-gs*.25,gy-gs*.3,gs*.18,gs*.1,-.3,0,Math.PI*2);
      cx.fillStyle='rgba(255,255,255,.55)';cx.fill();
      // Tiny bright dot
      cx.beginPath();cx.arc(gx-gs*.15,gy-gs*.35,gs*.06,0,Math.PI*2);
      cx.fillStyle='rgba(255,255,255,.8)';cx.fill();
    });
    // Leaf on top
    cx.beginPath();
    cx.moveTo(0,-R*.75);cx.quadraticCurveTo(R*.3,-R*.95,R*.2,-R*.65);
    cx.quadraticCurveTo(R*.1,-R*.8,0,-R*.75);cx.closePath();
    const lg=cx.createLinearGradient(0,-R*.95,R*.1,-R*.65);
    lg.addColorStop(0,'#4caf50');lg.addColorStop(1,'#2e7d32');
    cx.fillStyle=lg;cx.fill();
    // Stem
    cx.beginPath();cx.moveTo(0,-R*.75);cx.quadraticCurveTo(R*.08,-R*.9,R*.03,-R*.98);
    cx.strokeStyle='#5d4037';cx.lineWidth=1.5;cx.lineCap='round';cx.stroke();

  }else if(type==='melon'){
    // ★ WATERMELON SLICE - half-circle, vibrant green rind + red flesh
    const mr=R*.78;
    // Red flesh (half circle)
    cx.beginPath();cx.arc(0,R*.05,mr,Math.PI,0);cx.closePath();
    const mg=cx.createRadialGradient(-mr*.2,-mr*.3,0,0,R*.1,mr);
    mg.addColorStop(0,'#ff7b7b');mg.addColorStop(.3,'#ff3d3d');mg.addColorStop(.6,'#e53935');
    mg.addColorStop(.85,'#c62828');mg.addColorStop(1,'#8e0000');
    cx.fillStyle=mg;cx.fill();
    // Green rind (thick arc)
    cx.beginPath();cx.arc(0,R*.05,mr,Math.PI,0);
    cx.strokeStyle='#2e7d32';cx.lineWidth=R*.16;cx.stroke();
    cx.beginPath();cx.arc(0,R*.05,mr+R*.04,Math.PI,0);
    cx.strokeStyle='#43a047';cx.lineWidth=R*.06;cx.stroke();
    // Light green outer edge
    cx.beginPath();cx.arc(0,R*.05,mr+R*.08,Math.PI,0);
    cx.strokeStyle='#66bb6a';cx.lineWidth=R*.03;cx.stroke();
    // Seeds
    const seeds=[[-R*.25,-R*.15],[R*.15,-R*.12],[0,-R*.35],[-R*.35,-R*.25],[R*.3,-R*.22],[-R*.1,-R*.05],[R*.05,R*.0]];
    seeds.forEach(([sx2,sy2])=>{
      cx.save();cx.translate(sx2,sy2);cx.rotate(.3);
      cx.beginPath();cx.ellipse(0,0,R*.035,R*.055,0,0,Math.PI*2);
      cx.fillStyle='#1b0a00';cx.fill();
      // Seed highlight
      cx.beginPath();cx.ellipse(-R*.01,-R*.015,R*.012,R*.02,0,0,Math.PI*2);
      cx.fillStyle='rgba(255,255,255,.15)';cx.fill();
      cx.restore();
    });
    // Big shine on flesh
    cx.save();cx.beginPath();cx.arc(0,R*.05,mr-R*.08,Math.PI,0);cx.clip();
    cx.beginPath();cx.ellipse(-mr*.3,-mr*.35,mr*.35,mr*.18,-.4,0,Math.PI*2);
    const msh=cx.createRadialGradient(-mr*.3,-mr*.35,0,-mr*.3,-mr*.35,mr*.35);
    msh.addColorStop(0,'rgba(255,255,255,.5)');msh.addColorStop(.5,'rgba(255,255,255,.15)');msh.addColorStop(1,'transparent');
    cx.fillStyle=msh;cx.fill();
    cx.restore();
    // Bottom flat edge
    cx.beginPath();cx.moveTo(-mr,R*.05);cx.lineTo(mr,R*.05);
    cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1;cx.stroke();

  }else if(type==='plum'){
    // ★ ROUND PURPLE CANDY with wrapper bow-ties (like the icon)
    const cr2=R*.62;

    // === LEFT BOW-TIE WRAPPER ===
    cx.save();cx.translate(-cr2*.78,0);cx.rotate(-.42);
    // Left wing top
    cx.beginPath();cx.moveTo(0,0);cx.bezierCurveTo(-R*.35,-R*.08,-R*.45,-R*.3,-R*.28,-R*.42);cx.bezierCurveTo(-R*.1,-R*.52,0,-R*.28,0,0);cx.closePath();
    const lw1=cx.createLinearGradient(-R*.45,-R*.42,0,0);
    lw1.addColorStop(0,'#d966ff');lw1.addColorStop(.4,'#bf40ff');lw1.addColorStop(1,'#9b1fd4');
    cx.fillStyle=lw1;cx.fill();
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=.8;cx.stroke();
    // Left wing bottom
    cx.beginPath();cx.moveTo(0,0);cx.bezierCurveTo(-R*.35,R*.08,-R*.45,R*.3,-R*.28,R*.42);cx.bezierCurveTo(-R*.1,R*.52,0,R*.28,0,0);cx.closePath();
    const lw2=cx.createLinearGradient(-R*.45,R*.42,0,0);
    lw2.addColorStop(0,'#b833e8');lw2.addColorStop(.5,'#a020d0');lw2.addColorStop(1,'#7a0fb5');
    cx.fillStyle=lw2;cx.fill();
    cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=.8;cx.stroke();
    // Highlight crease on left bow
    cx.beginPath();cx.moveTo(-R*.1,-R*.35);cx.bezierCurveTo(-R*.25,-R*.25,-R*.32,-R*.1,-R*.22,0);
    cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;cx.stroke();
    cx.restore();

    // === RIGHT BOW-TIE WRAPPER ===
    cx.save();cx.translate(cr2*.78,0);cx.rotate(.42);
    // Right wing top
    cx.beginPath();cx.moveTo(0,0);cx.bezierCurveTo(R*.35,-R*.08,R*.45,-R*.3,R*.28,-R*.42);cx.bezierCurveTo(R*.1,-R*.52,0,-R*.28,0,0);cx.closePath();
    const rw1=cx.createLinearGradient(R*.45,-R*.42,0,0);
    rw1.addColorStop(0,'#d966ff');rw1.addColorStop(.4,'#bf40ff');rw1.addColorStop(1,'#9b1fd4');
    cx.fillStyle=rw1;cx.fill();
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=.8;cx.stroke();
    // Right wing bottom
    cx.beginPath();cx.moveTo(0,0);cx.bezierCurveTo(R*.35,R*.08,R*.45,R*.3,R*.28,R*.42);cx.bezierCurveTo(R*.1,R*.52,0,R*.28,0,0);cx.closePath();
    const rw2=cx.createLinearGradient(R*.45,R*.42,0,0);
    rw2.addColorStop(0,'#b833e8');rw2.addColorStop(.5,'#a020d0');rw2.addColorStop(1,'#7a0fb5');
    cx.fillStyle=rw2;cx.fill();
    cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=.8;cx.stroke();
    // Highlight crease on right bow
    cx.beginPath();cx.moveTo(R*.1,-R*.35);cx.bezierCurveTo(R*.25,-R*.25,R*.32,-R*.1,R*.22,0);
    cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;cx.stroke();
    cx.restore();

    // === MAIN ROUND CANDY BODY ===
    cx.beginPath();cx.arc(0,0,cr2,0,Math.PI*2);
    const pg=cx.createRadialGradient(-cr2*.3,-cr2*.35,cr2*.05,cr2*.1,cr2*.1,cr2*1.3);
    pg.addColorStop(0,'#e880ff');pg.addColorStop(.18,'#cc44ff');pg.addColorStop(.4,'#a020d4');
    pg.addColorStop(.65,'#7a10aa');pg.addColorStop(.85,'#5a0080');pg.addColorStop(1,'#3a0060');
    cx.fillStyle=pg;cx.fill();
    // Outer rim
    cx.strokeStyle='rgba(220,130,255,.35)';cx.lineWidth=1.5;cx.stroke();

    // === GLOSSY HIGHLIGHT (large top-left) ===
    cx.save();cx.beginPath();cx.arc(0,0,cr2,0,Math.PI*2);cx.clip();
    cx.beginPath();cx.ellipse(-cr2*.28,-cr2*.32,cr2*.42,cr2*.26,-.3,0,Math.PI*2);
    const psh=cx.createRadialGradient(-cr2*.28,-cr2*.32,0,-cr2*.28,-cr2*.32,cr2*.42);
    psh.addColorStop(0,'rgba(255,255,255,.75)');
    psh.addColorStop(.35,'rgba(255,255,255,.28)');
    psh.addColorStop(.7,'rgba(255,255,255,.05)');
    psh.addColorStop(1,'transparent');
    cx.fillStyle=psh;cx.fill();
    // Small bright dot
    cx.beginPath();cx.arc(-cr2*.18,-cr2*.42,cr2*.09,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,.88)';cx.fill();
    // Bottom inner reflection
    cx.beginPath();cx.ellipse(cr2*.1,cr2*.48,cr2*.32,cr2*.12,.1,0,Math.PI*2);
    cx.fillStyle='rgba(180,80,255,.15)';cx.fill();
    cx.restore();

    // === WRAPPER NECK (where bow meets ball) ===
    cx.save();
    // Left neck
    cx.beginPath();cx.moveTo(-cr2*.72,-R*.07);cx.lineTo(-cr2,-R*.07);cx.lineTo(-cr2,R*.07);cx.lineTo(-cr2*.72,R*.07);cx.closePath();
    const nk=cx.createLinearGradient(-cr2,-0,-cr2*.72,0);
    nk.addColorStop(0,'#8a10c0');nk.addColorStop(.5,'#b030e0');nk.addColorStop(1,'#cc44ff');
    cx.fillStyle=nk;cx.fill();
    // Right neck
    cx.beginPath();cx.moveTo(cr2*.72,-R*.07);cx.lineTo(cr2,-R*.07);cx.lineTo(cr2,R*.07);cx.lineTo(cr2*.72,R*.07);cx.closePath();
    cx.fillStyle=nk;cx.fill();
    cx.restore();

  }else if(type==='banana'){
    // ★ BANANA - curved, glossy yellow with brown tips
    cx.save();cx.rotate(-.15);
    const bw=R*.35, bl=R*.85;
    cx.beginPath();
    cx.moveTo(-R*.15,-bl);
    cx.bezierCurveTo(-R*.6,-bl*.6,-R*.7,bl*.2,-R*.35,bl*.8);
    cx.quadraticCurveTo(-R*.1,bl*1.05,R*.15,bl*.85);
    cx.bezierCurveTo(R*.3,bl*.3,R*.15,-bl*.4,-R*.15,-bl);
    cx.closePath();
    const bg2=cx.createLinearGradient(-R*.5,-bl,R*.2,bl);
    bg2.addColorStop(0,'#fff9c4');bg2.addColorStop(.15,'#ffee58');bg2.addColorStop(.35,'#fdd835');

  }else if(type==='bluecandy'){

// ═══ PARTICLES DRAW ═══
function drawParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=p.d;
    if(p.l<=0){parts.splice(i,1);continue}
    cx.globalAlpha=p.l;
    if(p.type==='star'){
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.l*6);
      cx.beginPath();for(let j=0;j<8;j++){const a=j*Math.PI/4,rd=j%2?p.s*.4:p.s;cx.lineTo(Math.cos(a)*rd*p.l,Math.sin(a)*rd*p.l)}
      cx.closePath();cx.fillStyle=p.c;cx.fill();cx.restore();
    }else{
      cx.beginPath();cx.arc(p.x,p.y,p.s*p.l,0,Math.PI*2);cx.fillStyle=p.c;cx.fill();
    }
    cx.globalAlpha=1;
  }
}
function drawSparkles(t){
  for(let i=sparkles.length-1;i>=0;i--){
    const s=sparkles[i];s.l-=s.d;
    if(s.l<=0){sparkles.splice(i,1);continue}
    const twinkle=Math.sin(t*s.sp+s.phase)*.5+.5;
    const sz=s.s*s.l*twinkle;
    cx.save();cx.translate(s.x,s.y);cx.rotate(t*.003+s.phase);
    cx.globalAlpha=s.l*twinkle;
    // 4-point star sparkle
    cx.beginPath();
    cx.moveTo(0,-sz);cx.lineTo(sz*.2,0);cx.lineTo(0,sz);cx.lineTo(-sz*.2,0);cx.closePath();
    cx.fillStyle='#fff';cx.fill();
    cx.beginPath();
    cx.moveTo(-sz,0);cx.lineTo(0,sz*.2);cx.lineTo(sz,0);cx.lineTo(0,-sz*.2);cx.closePath();
    cx.fillStyle='rgba(255,255,200,.8)';cx.fill();
    cx.restore();
  }
}
function drawShockwaves(){
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];
    s.r+=s.speed;s.l-=.025;
    if(s.l<=0){shockwaves.splice(i,1);continue}
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${s.l*.4})`;cx.lineWidth=2*s.l;cx.stroke();

}
function drawCoins(){
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];c.x+=c.vx;c.y+=c.vy;c.vy+=.05;c.r+=c.rs;c.l-=c.d;
    if(c.l<=0||c.y>H+20){coins.splice(i,1);continue}
    cx.save();cx.translate(c.x,c.y);cx.rotate(c.r);cx.globalAlpha=c.l;

// ═══ WIN LINES & CLUSTER DISPLAY ═══
function drawWinLines(now){
  if(!activeWins.length)return;
  const pulse=.5+.5*Math.sin(now*.005);
  cx.save();
  for(const w of activeWins){
    const col=w.color||'#fff';
    // Connection lines between adjacent cells
    cx.lineWidth=2+2*pulse;
    cx.strokeStyle=col;
    cx.shadowColor=col;
    cx.shadowBlur=10+8*pulse;
    cx.globalAlpha=.5+.5*pulse;
    const drawn=new Set();
    for(const [c1,r1] of w.cells){
      for(const [c2,r2] of w.cells){
        if(c1===c2&&r1===r2)continue;
        if(Math.abs(c1-c2)+Math.abs(r1-r2)!==1)continue;
        const k=Math.min(c1*ROWS+r1,c2*ROWS+r2)+','+Math.max(c1*ROWS+r1,c2*ROWS+r2);
        if(drawn.has(k))continue;drawn.add(k);
        cx.beginPath();
        cx.moveTo(gL+c1*cW+cW/2,gT+r1*cH+cH/2);
        cx.lineTo(gL+c2*cW+cW/2,gT+r2*cH+cH/2);
        cx.stroke();
      }
    }
    // Glowing frames around winning cells
    cx.lineWidth=2.5;cx.globalAlpha=.4+.6*pulse;cx.shadowBlur=6+4*pulse;
    for(const [c,r] of w.cells){
      const x=gL+c*cW+3,y=gT+r*cH+3,bw=cW-6,bh=cH-6;
      cx.beginPath();cx.roundRect(x,y,bw,bh,8);cx.stroke();
    }
    // Per-cluster win amount
    if(w.amount>0){
      cx.shadowColor='rgba(0,0,0,.8)';cx.shadowBlur=4;cx.globalAlpha=1;
      const fs=Math.min(cW*.32,20);
      cx.font=`900 ${fs}px Inter`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillStyle='#fff';
      cx.fillText('+'+w.amount.toFixed(2),w.cx,w.cy);
    }
  }
  // Tumble counter
  if(tumbleNum>1){
    cx.shadowBlur=0;cx.globalAlpha=.7;
    cx.font=`800 ${Math.min(cW*.24,13)}px Inter`;cx.textAlign='right';
    cx.fillStyle='#ffe44d';
    cx.fillText('TUMBLE ×'+tumbleNum,gL+COLS*cW-4,gT-6);
  }
  cx.restore();
}

// ═══ CLUSTER DETECTION ═══
function findClusters(){
  const vis=Array.from({length:COLS},()=>Array(ROWS).fill(false)),cls=[];
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    if(vis[c][r]||!grid[c][r])continue;
    const sid=grid[c][r].id;if(sid===SCAT||sid===BOMB)continue;
    const cl=[],q=[[c,r]];vis[c][r]=true;
    while(q.length){const[cc,cr]=q.shift();cl.push([cc,cr]);
    for(const[nc,nr]of[[cc-1,cr],[cc+1,cr],[cc,cr-1],[cc,cr+1]]){
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS||vis[nc][nr]||!grid[nc][nr])continue;
      if(grid[nc][nr].id===sid){vis[nc][nr]=true;q.push([nc,nr])}
    }}
    if(cl.length>=8)cls.push({sid,cells:cl});
  }
  return cls;
}
function cntScat(){let n=0;for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(grid[c][r]&&grid[c][r].id===SCAT)n++;return n}
function calcWin(cl){const tp=SYM[cl.sid],cnt=cl.cells.length;return bet*(tp.pMin+(tp.pMax-tp.pMin)*Math.min(cnt/30,1))*(cnt/8)}

// ═══ SPIN LOGIC ═══
let spinCols=[],pending=[];

function startSpin(){
  if(state!=='IDLE')return;
  initAudio();sndSpin();
  const inFS=fsLeft>0;
  if(!inFS){const ba=ante?bet*2:bet;if(bal<ba)return;bal-=ba;updBal();fsTotalWin=0}
  totWin=0;tumbleNum=0;activeWins=[];if(!inFS)updWin(0);hideWP();updBuyBtns();
  state='SPINNING';document.getElementById('spB').classList.add('sp');
  pending=[];
  for(let c=0;c<COLS;c++){pending[c]=[];for(let r=0;r<ROWS;r++){
    if(inFS&&stickyGrid[c]&&stickyGrid[c][r]){pending[c][r]=BOMB;continue}
    pending[c][r]=inFS?fsSym():rndSym();
  }}

  // ═══ ADVANCED SPIN SYSTEM ═══
  // Ease In start, Elastic Out stop, Motion Blur, Scatter Anticipation
  // Optimized for mobile TMA (minimal allocations, cached gradients)

  // Check if scatters on early reels (for anticipation on later reels)
  let scatterAnticipation=false;
  const scatCount=()=>{let n=0;for(let c2=0;c2<3;c2++)for(let r2=0;r2<ROWS;r2++)if(pending[c2]&&pending[c2][r2]===SCAT)n++;return n};

  spinCols=[];
  const TAPE_LEN=turbo?14:22;
  const scats=scatCount();
  scatterAnticipation=scats>=2;

  for(let c=0;c<COLS;c++){
    const tape=[];
    for(let i=0;i<TAPE_LEN;i++) tape.push(rndSym());
    for(let r=0;r<ROWS;r++) tape.push(pending[c][r]);
    const totalDist=tape.length*cH;
    const delay=c*(turbo?50:100);
    // Anticipation: last 2 reels spin MUCH longer if 2+ scatters on first reels
    let duration=turbo?350:700+c*(turbo?30:80);
    if(scatterAnticipation&&c>=4) duration+=turbo?400:900;
    else if(scatterAnticipation&&c===3) duration+=turbo?200:500;

    spinCols[c]={
      ph:'spin',tape,totalDist,
      startTime:performance.now()+delay,
      duration,
      offset:0,speed:0,maxSpeed:cH*(turbo?.5:.35),
      bounceV:0,bounceY:0,bouncePhase:0,
      landed:false,impactDone:false,
      anticipate:scatterAnticipation&&c>=3,
      elasticDone:false
    };
    for(let r=0;r<ROWS;r++) if(grid[c][r]) grid[c][r].al=0;
  }
}

// Elastic Out easing: spring-like overshoot
function elasticOut(t){
  if(t===0||t===1)return t;
  const p=.35,s=p/4;
  return Math.pow(2,-10*t)*Math.sin((t-s)*(2*Math.PI)/p)+1;
}
// Ease In (quadratic)
function easeInQuad(t){return t*t}
// Back ease out (slight overshoot)
function easeOutBack(t){const c=1.7;const c3=c+1;return 1+c3*Math.pow(t-1,3)+c*Math.pow(t-1,2)}

function updSpin(now){
  let done=true;
  for(let c=0;c<COLS;c++){
    const sc=spinCols[c];if(!sc||sc.ph==='done')continue;
    done=false;

    if(sc.ph==='spin'){
      const elapsed=now-sc.startTime;
      if(elapsed<0) continue;
      const progress=Math.min(elapsed/sc.duration,1);

      // 3-phase easing: Ease-In → Cruise → Elastic/Back Out
      let easedProgress;
      const accelEnd=.12, cruiseEnd=.55;
      if(progress<accelEnd){
        // Ease In: smooth start
        const t=progress/accelEnd;
        easedProgress=accelEnd*easeInQuad(t);
      }else if(progress<cruiseEnd){
        // Cruise: linear fast
        const t=(progress-accelEnd)/(cruiseEnd-accelEnd);
        easedProgress=accelEnd+(cruiseEnd-accelEnd)*t;
      }else{
        // Decelerate with elastic overshoot for anticipation reels, back ease for normal
        const t=(progress-cruiseEnd)/(1-cruiseEnd);
        if(sc.anticipate){
          // Dramatic slowdown + slight spring
          const e=elasticOut(t);
          easedProgress=cruiseEnd+(1-cruiseEnd)*e;
        }else{
          const e=easeOutBack(t);
          easedProgress=cruiseEnd+(1-cruiseEnd)*Math.min(e,1.02);
        }
      }

      sc.offset=Math.max(0,easedProgress*sc.totalDist);

      // Speed calc for motion blur intensity
      if(progress<accelEnd) sc.speed=sc.maxSpeed*(progress/accelEnd);
      else if(progress<cruiseEnd) sc.speed=sc.maxSpeed;
      else{
        const t=(progress-cruiseEnd)/(1-cruiseEnd);
        sc.speed=sc.maxSpeed*Math.max(0,(1-t)*(1-t));
        // Anticipation: dramatic slow → speed bump → stop
        if(sc.anticipate&&t>.5&&t<.7) sc.speed=sc.maxSpeed*.15;
      }

      if(progress>=1){
        sc.ph='land';sc.bounceV=sc.anticipate?18:12;sc.bounceY=sc.anticipate?-25:-16;sc.offset=sc.totalDist;sc.bouncePhase=0;
        for(let r=0;r<ROWS;r++){
          if(stickyGrid[c]&&stickyGrid[c][r]&&grid[c][r]){
            grid[c][r].al=1;grid[c][r].gl=.6;continue;
          }
          grid[c][r]=mkSym(c,r,pending[c][r]);grid[c][r].al=1;
          grid[c][r].popSc=1;
          if(pending[c][r]===BOMB){
            const ms=[2,3,5,10,15,20,25,50,100],ws2=[20,18,16,14,10,8,6,5,3];
            let tw2=ws2.reduce((a,b)=>a+b,0),rr2=gameRand()*tw2,mv=2;
            for(let i=0;i<ms.length;i++){rr2-=ws2[i];if(rr2<=0){mv=ms[i];break}}
            grid[c][r].bm=mv;
          }
        }
        sndStop(c);
        // Impact effects
        const cx2=gL+c*cW+cW/2;
        for(let r=0;r<ROWS;r++){
          addP(cx2,gT+r*cH+cH/2,'rgba(255,255,255,.6)',3);
          addSparkle(cx2,gT+r*cH+cH/2,2);
        }
        if(sc.anticipate) addShockwave(cx2,gT+gH/2);
      }
    }

    if(sc.ph==='land'){
      // Elastic bounce: damped spring
      sc.bouncePhase++;
      sc.bounceV+=2.5;
      sc.bounceY+=sc.bounceV;
      if(sc.bounceY>=0){
        sc.bounceY=0;
        sc.bounceV=-sc.bounceV*.28; // Elastic damping
        if(Math.abs(sc.bounceV)<.5){
          sc.ph='done';sc.bounceY=0;
          for(let r=0;r<ROWS;r++) if(grid[c][r]) grid[c][r].y=grid[c][r].ty;
          continue;
        }
      }
      for(let r=0;r<ROWS;r++) if(grid[c][r]) grid[c][r].y=grid[c][r].ty+sc.bounceY;
    }
  }
  if(done){document.getElementById('spB').classList.remove('sp');onSpinDone()}
}

function drawSpinColumn(c,now){
  const sc=spinCols[c];if(!sc||sc.ph==='done'||sc.ph==='land')return;
  const elapsed=now-sc.startTime;
  if(elapsed<0)return;

  const colX=gL+c*cW, colW=cW;
  cx.save();
  cx.beginPath();cx.rect(colX-2,gT-4,colW+4,gH+8);cx.clip();

  const tape=sc.tape, offset=sc.offset, speed=sc.speed;
  const blurIntensity=Math.min(speed/sc.maxSpeed,1);

  // ═══ DYNAMIC MOTION BLUR ═══
  for(let i=0;i<tape.length;i++){
    const symY=gT+i*cH+cH/2-offset;
    if(symY<gT-cH||symY>gT+gH+cH) continue;
    const symX=colX+colW/2;
    const symId=tape[i];
    const tp2=SYM[symId];

    if(blurIntensity>.25){
      // Motion blur — multi-layer streak effect
      const streakH=cH*blurIntensity*.7;
      const layers=blurIntensity>.6?3:2;
      for(let l=0;l<layers;l++){
        const layerOff=(l-1)*streakH*.15;
        const layerA=1-l*.25;
        const sg=cx.createLinearGradient(symX,symY-streakH/2+layerOff,symX,symY+streakH/2+layerOff);
        sg.addColorStop(0,'transparent');
        sg.addColorStop(.2,tp2.colors[0]+(Math.floor(layerA*100).toString(16).padStart(2,'0')));
        sg.addColorStop(.5,tp2.colors[0]+(Math.floor(layerA*200).toString(16).padStart(2,'0')));
        sg.addColorStop(.8,tp2.colors[0]+(Math.floor(layerA*100).toString(16).padStart(2,'0')));
        sg.addColorStop(1,'transparent');
        cx.fillStyle=sg;
        const w=sR*(1.4-l*.15);
        cx.beginPath();roundRect(symX-w/2,symY-streakH/2+layerOff,w,streakH,w*.25);cx.fill();
      }
      // Hot core
      cx.beginPath();cx.arc(symX,symY,sR*.3*(1-blurIntensity*.3),0,Math.PI*2);
      const coreG=cx.createRadialGradient(symX,symY,0,symX,symY,sR*.3);
      coreG.addColorStop(0,tp2.colors[3]||tp2.colors[0]);coreG.addColorStop(1,'transparent');
      cx.fillStyle=coreG;cx.fill();
    }else{
      // Slow: draw actual symbol with slight blur
      const tmpSym={id:symId,x:symX,y:symY,sc:1-blurIntensity*.2,al:1-blurIntensity*.4,gl:0,bp:0,fall:false,bm:0,shimmer:undefined};
      drawSym(tmpSym,now);
    }
  }

  // Edge fade overlays
  const fadeH=cH*.7;
  const topFade=cx.createLinearGradient(0,gT,0,gT+fadeH);
  topFade.addColorStop(0,'rgba(74,26,122,.95)');topFade.addColorStop(1,'transparent');
  cx.fillStyle=topFade;cx.fillRect(colX-2,gT-4,colW+4,fadeH);

  const botFade=cx.createLinearGradient(0,gT+gH-fadeH,0,gT+gH);
  botFade.addColorStop(0,'transparent');botFade.addColorStop(1,'rgba(74,26,122,.95)');
  cx.fillStyle=botFade;cx.fillRect(colX-2,gT+gH-fadeH,colW+4,fadeH+8);

  // Column glow during spin (anticipation reels glow brighter)
  const glowAlpha=sc.anticipate?blurIntensity*.1:blurIntensity*.05;
  const glowColor=sc.anticipate?'rgba(255,215,0,':'rgba(198,130,255,';
  cx.beginPath();cx.moveTo(colX+colW/2,gT);cx.lineTo(colX+colW/2,gT+gH);
  cx.strokeStyle=glowColor+glowAlpha+')';cx.lineWidth=colW*.8;cx.stroke();

  cx.restore();
}

// ═══ FREE SPINS INTRO ═══
function showFSIntro(count,mulStart,cb){
  const el=document.getElementById('fsiOverlay');
  document.getElementById('fsiCount').textContent=count;
  document.getElementById('fsiMul').textContent=mulStart>1?`Starting Multiplier ×${mulStart}`:'';
  el.classList.add('sh');
  addCoins(10);
  gc.classList.add('shk');setTimeout(()=>gc.classList.remove('shk'),400);
  setTimeout(()=>{el.classList.remove('sh');if(cb)cb()},2500);
}

// ═══ TUMBLE LOGIC ═══
let tumbleQ=null,tumbleTimer=0;
let stickyGrid=[];
function clearSticky(){stickyGrid=[];for(let c=0;c<COLS;c++)stickyGrid[c]=Array(ROWS).fill(false)}
clearSticky();

function onSpinDone(){
  state='RESOLVING';
  if(fsLeft>0){
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
      if(grid[c][r]&&grid[c][r].id===BOMB&&!stickyGrid[c][r]){
        stickyGrid[c][r]=true;
        grid[c][r].gl=.6;
        addShockwave(grid[c][r].x,grid[c][r].y);
        addSparkle(grid[c][r].x,grid[c][r].y,5);
      }
    }
  }
  const sc=cntScat();
  if(sc>=3&&fsLeft===0){
    const spinsWon=sc>=6?25:sc>=5?20:sc>=4?15:10;
    sndScatter();
    state='IDLE';
    showFSIntro(spinsWon,1,()=>{
      fsLeft=spinsWon;fsMul=1;clearSticky();
      document.getElementById('fsB').classList.add('sh');updFS();updBuyBtns();
      startSpin();
    });
    return;
  }
  checkClusters();
}

function checkClusters(){
  const cls=findClusters();
  if(cls.length===0){
    activeWins=[];
    if(fsLeft>0){
      let bm=0;
      for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
        if(grid[c][r]&&grid[c][r].id===BOMB) bm+=grid[c][r].bm||0;
      }
      if(bm>0){fsMul=1+bm;updFS()}
    }
    if(totWin>0){
      const mul=fsLeft>0?fsMul:1;
      const finalWin=totWin*mul;
      bal+=finalWin;updBal();
      fsTotalWin+=finalWin;
      showWP(finalWin,fsLeft>0?fsMul:0);
      updWin(fsLeft>0?fsTotalWin:finalWin);
      if(finalWin>=bet*50)addCoins(40);
      else if(finalWin>=bet*20){addCoins(15);gc.classList.add('shk');setTimeout(()=>gc.classList.remove('shk'),500)}
    }
    if(fsLeft>0){
      fsLeft--;updFS();
      const delay=totWin>0?1500:400;
      setTimeout(()=>{
        hideWP();totWin=0;
        state='IDLE';
        if(fsLeft>0){startSpin()}
        else{
          // Show total free spins win
          if(fsTotalWin>0){
            showWP(fsTotalWin,fsMul);
            updWin(fsTotalWin);
            if(fsTotalWin>=bet*50)startConfetti();
            setTimeout(()=>{hideWP();fsTotalWin=0;updBuyBtns()},3000);
          }else{updBuyBtns()}
          document.getElementById('fsB').classList.remove('sh');
          clearSticky();
          if(autoP) setTimeout(startSpin,3500);
        }
      },delay);
    }else{
      state='IDLE';totWin=0;fsTotalWin=0;
      clearSticky();updBuyBtns();
      if(autoP) setTimeout(startSpin,800);
    }
    return;
  }

  activeWins=[];tumbleNum++;
  let roundWin=0;const _preTotal=totWin;
  cls.forEach(cl=>{
    const amt=calcWin(cl);roundWin+=amt;
    let sx=0,sy=0,n=0;
    cl.cells.forEach(([c,r])=>{
      if(grid[c][r]){
        grid[c][r].gl=1;
        addP(grid[c][r].x,grid[c][r].y,SYM[cl.sid].colors[0],10);
        addSparkle(grid[c][r].x,grid[c][r].y,5);
        addShockwave(grid[c][r].x,grid[c][r].y);
        sx+=grid[c][r].x;sy+=grid[c][r].y;n++;
      }
    });
    activeWins.push({cells:cl.cells,color:SYM[cl.sid].colors[0],amount:amt,cx:n?sx/n:0,cy:n?sy/n:0});
  });
  totWin+=roundWin;
  updWin(totWin);
  if(totWin>=bet*20)sndBigWin();else if(roundWin>0)sndWin();

  setTimeout(()=>{
    activeWins=[];
    cls.forEach(cl=>{cl.cells.forEach(([c,r])=>{
      if(grid[c][r]&&!(stickyGrid[c]&&stickyGrid[c][r])){
        addP(grid[c][r].x,grid[c][r].y,SYM[grid[c][r].id].colors[0],12);grid[c][r]=null;
      }
    })});
    setTimeout(()=>{tumbleFall();setTimeout(checkClusters,turbo?300:500)},turbo?150:250);
  },turbo?400:800);
}

function tumbleFall(){
  for(let c=0;c<COLS;c++){
    let empty=0;
    for(let r=ROWS-1;r>=0;r--){
      if(stickyGrid[c]&&stickyGrid[c][r])continue;
      if(!grid[c][r])empty++;
      else if(empty>0){
        let target=r+empty;
        while(target<ROWS&&stickyGrid[c]&&stickyGrid[c][target])target--;
        if(target!==r&&target<ROWS&&!stickyGrid[c][target]){
          grid[c][target]=grid[c][r];grid[c][r]=null;
          const s=grid[c][target];s.r=target;s.ty=gT+target*cH+cH/2;s.fall=true;s.vy=0;
        }
      }
    }
    for(let r=0;r<ROWS;r++){
      if(grid[c][r]||(stickyGrid[c]&&stickyGrid[c][r]))continue;
      const id=fsLeft>0?fsSym():rndSym();
      grid[c][r]=mkSym(c,r,id);grid[c][r].y=gT-cH*2;grid[c][r].fall=true;grid[c][r].vy=0;grid[c][r].popSc=1;
      if(id===BOMB){
        const ms=[2,3,5,10,15,20,25,50,100],ws2=[20,18,16,14,10,8,6,5,3];
        let tw2=ws2.reduce((a,b)=>a+b,0),rr2=gameRand()*tw2,mv=2;
        for(let i=0;i<ms.length;i++){rr2-=ws2[i];if(rr2<=0){mv=ms[i];break}}
        grid[c][r].bm=mv;
      }
    }
  }
}

// ═══ ANIMATION LOOP ═══
function updFall(){
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    const s=grid[c][r];if(!s||!s.fall)continue;
    s.vy+=1.2;s.y+=s.vy;
    if(s.y>=s.ty){s.y=s.ty;if(s.vy>2){s.vy=-s.vy*.25;addP(s.x,s.y+sR*.5,SYM[s.id].colors[0],2)}else{s.vy=0;s.fall=false;addSparkle(s.x,s.y,1)}}
  }
}

function frame(now){
  if(!t0)t0=now;
  cx.clearRect(0,0,W,H);
  drawBG(now);
  drawGridBG();

  if(state==='SPINNING'){
    updSpin(now);
    for(let c=0;c<COLS;c++) drawSpinColumn(c,now);
  }

  updFall();

  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    const s=grid[c][r];if(s)drawSym(s,now);
  }

  drawParts();drawSparkles(now);drawShockwaves();drawCoins();
  drawWinLines(now);
  updConfetti();
  requestAnimationFrame(frame);
}

// ═══ UI HELPERS ═══
function updBal(){document.getElementById('bVal').textContent=bal.toFixed(2);try{window.parent.postMessage({type:'balSync',bal:bal.toFixed(2)},'*')}catch(e){}}
function updWin(v){document.getElementById('wVal').textContent=v.toFixed(2)}
function updBet(){document.getElementById('btV').textContent=bet.toFixed(2)}
function updFS(){document.getElementById('fsC').textContent=fsLeft;document.getElementById('fsM').textContent=fsMul}
function showWP(amt,mul){
  const ratio=amt/bet;
  const tier=ratio>=100?'EPIC WIN':ratio>=50?'MEGA WIN':ratio>=20?'BIG WIN':'WIN';
  document.getElementById('wPop').querySelector('.wl').textContent=tier;
  document.getElementById('wPA').textContent=amt.toFixed(2);
  document.getElementById('wPM').textContent=mul>1?`×${mul} MULTI`:'';
  const wp=document.getElementById('wPop');
  wp.className='wp sh'+(ratio>=50?' epic':ratio>=20?' big':'');
  if(ratio>=20){addCoins(ratio>=50?50:25);gc.classList.add('shk');setTimeout(()=>gc.classList.remove('shk'),600);startConfetti()}
}
function hideWP(){document.getElementById('wPop').className='wp'}

// ═══ EVENT HANDLERS ═══
document.getElementById('spB').addEventListener('click',startSpin);
document.getElementById('bM').addEventListener('click',()=>{if(state!=='IDLE'||fsLeft>0)return;sndClick();bIdx=Math.max(0,bIdx-1);bet=BETS[bIdx];updBet()});
document.getElementById('bP').addEventListener('click',()=>{if(state!=='IDLE'||fsLeft>0)return;sndClick();bIdx=Math.min(BETS.length-1,bIdx+1);bet=BETS[bIdx];updBet()});
document.getElementById('tbB').addEventListener('click',function(){sndClick();turbo=!turbo;this.classList.toggle('ac',turbo)});
document.getElementById('auB').addEventListener('click',function(){sndClick();autoP=!autoP;this.classList.toggle('ac',autoP);if(autoP&&state==='IDLE')startSpin()});
document.getElementById('anS').addEventListener('click',function(){sndClick();ante=!ante;this.classList.toggle('on',ante)});
document.getElementById('sndB').addEventListener('click',function(){sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇'});
document.getElementById('ptB').addEventListener('click',function(){sndClick();document.getElementById('ptM').classList.toggle('sh')});

// ═══ BUY BONUS ═══
function updBuyBtns(){
  const cost1=bet*100, cost2=bet*250;
  document.getElementById('buyCost').textContent=cost1.toFixed(2);
  document.getElementById('buyCostS').textContent=cost2.toFixed(2);
  const dis=state!=='IDLE'||fsLeft>0;
  document.getElementById('buyB').classList.toggle('dis',dis||bal<cost1);
  document.getElementById('buyS').classList.toggle('dis',dis||bal<cost2);
}
function buyBonus(superMode){
  if(state!=='IDLE'||fsLeft>0)return;
  initAudio();sndClick();
  const cost=superMode?bet*250:bet*100;
  if(bal<cost)return;
  bal-=cost;updBal();
  const spins=superMode?15:10;
  const startMul=superMode?3:1;
  fsTotalWin=0;updWin(0);
  updBuyBtns();
  showFSIntro(spins,startMul,()=>{
    fsLeft=spins;fsMul=startMul;clearSticky();
    document.getElementById('fsB').classList.add('sh');updFS();
    startSpin();
  });
}
document.getElementById('buyB').addEventListener('click',()=>buyBonus(false));
document.getElementById('buyS').addEventListener('click',()=>buyBonus(true));
const origUpdBet=updBet;
updBet=function(){origUpdBet();updBuyBtns()};

function goBack(){try{window.parent.postMessage('back','*')}catch(e){}try{window.history.back()}catch(e){}}
document.getElementById('bkBtn').addEventListener('click',goBack);

// ═══ SEED LISTENER ═══
window.addEventListener('message',e=>{
  if(e.data&&typeof e.data==='object'&&e.data.type==='setSeed'&&e.data.seed) setSeed(parseInt(e.data.seed));
});

// ═══ INIT ═══
resize();initGrid();updBuyBtns();buildPaytable();resizeConf();updBal();requestAnimationFrame(frame);
})();
